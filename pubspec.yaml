version: 5.4.0
homepage: https://github.com/vicajilau/platform_detail

environment:
  sdk: '>=2.15.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  device_info_plus: ^12.3.0
  dio: ^5.9.2
  package_info_plus: ^9.0.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

